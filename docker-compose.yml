services:
  postgres:
    image: postgres:16-alpine
    container_name: starwars-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: starwars
      POSTGRES_PASSWORD: starwars_password
      POSTGRES_DB: starwars_movies
    ports:
      - "5432:5432"
    volumes:
      - starwars_postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: starwars-redis
    restart: unless-stopped
    ports:
      - "6379:6379"

volumes:
  starwars_postgres_data: